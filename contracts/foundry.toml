[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Monad-specific: Monad's EVM is at Prague. Do not lower this.
evm_version = "prague"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

# Emit the metadata forge needs for Sourcify verification on Monad
bytecode_hash = "ipfs"
cbor_metadata = true

[rpc_endpoints]
monad = "https://rpc.monad.xyz"
monad_logs = "https://rpc1.monad.xyz"
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
monad = { key = "${ETHERSCAN_API_KEY}", chain = 143, url = "https://api.etherscan.io/v2/api" }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
